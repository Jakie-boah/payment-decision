services:
  postgres:
    image: postgres:16-alpine
    container_name: test-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=payment_decision
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "user", "-h", "test-postgres" ]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "status" ]
      interval: 5s
      retries: 5
      timeout: 5s

  api:
    container_name: api
    env_file:
      - .env
    build:
      context: .

    command: >
      sh -c "uvicorn src.presentation.http_api.main:app_factory --host 0.0.0.0 --port 8001 --reload --factory"

    ports:
      - "8001:8001"

    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  outbox:
    container_name: outbox
    env_file:
      - .env

    build:
      context: .

    command: >
      sh -c "uv run python -m src.presentation.outbox.main"

    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  amqp-api:
    container_name: amqp-api
    env_file:
      - .env

    build:
      context: .

    command: >
      sh -c "uv run python -m src.presentation.amqp_api.main"

    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
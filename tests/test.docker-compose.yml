services:
  tests:
    container_name: tests
    build:
      context: ../.

    volumes:
      - ../.:/app

    env_file:
      - .env.test

    entrypoint:
      sh -c "
      uv run pytest tests/src
      "

  test-postgres:
    image: postgres:16-alpine
    container_name: test-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=payment_decision_test
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "user", "-h", "test-postgres" ]
      interval: 10s
      timeout: 5s
      retries: 3





